services:
  postgres:
    image: postgres:17-alpine
    container_name: expo-example-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

# The api service used to run here too. It now ships as a Cloudflare
# Worker — run `pnpm --filter api dev` (which calls `wrangler dev`) for
# a local Worker simulator that talks to this postgres container.

volumes:
  postgres-data:
