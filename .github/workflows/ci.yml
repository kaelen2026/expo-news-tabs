name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel earlier runs on the same branch when a newer commit arrives.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck, lint, test
    runs-on: ubuntu-latest

    # A throwaway Postgres for the DB-backed tests in apps/api. Without
    # TEST_DATABASE_URL those tests would `describe.skipIf` themselves and
    # we'd ship broken news/favorites/reads/preferences code silently.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://app:app@localhost:5432/app

    steps:
      - uses: actions/checkout@v4

      # `packageManager` in package.json pins pnpm; pin Node from `engines`.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Three checks, each as its own step so the failing one is obvious
      # from the Actions summary. Turbo caches downstream of the same job
      # via the per-task pipeline.
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
